[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rifthub-backend"
version = "0.1.0"
description = "Shared backend package for RiftHub runtime services."
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.13,<4.0",
    "asyncpg>=0.30,<1.0",
    "feedparser>=6.0.11,<7.0",
    "greenlet>=3.2,<4.0",
    "python-dotenv>=1.1,<2.0",
    "sqlalchemy>=2.0.36,<3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/rifthub_backend"]
